<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Profiles — India</title>
    <link rel="stylesheet" href="/styles/tokens.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/report.css">
</head>
<body>

    <!-- ── Navigation Bar ── -->
    <nav class="nav-bar">
        <div class="nav-brand">
            <span class="nav-title">Country Profiles</span>
            <span class="nav-badge">
                <img src="assets/flagpedia_india.svg" class="flag-icon" alt="Indian flag">
                India
            </span>
        </div>
        <div class="nav-actions">
            <div id="user-button"></div>
        </div>
    </nav>

    <!-- ── Content Shell (two-panel grid) ── -->
    <div class="content-shell">

        <!-- ── Main Area ── -->
        <main class="main-area">
            <div id="sign-in" class="sign-in-overlay" style="display: none;"></div>

            <div id="error-banner" class="error-banner"></div>

            <!-- Welcome State -->
            <div id="welcome-state" class="welcome-state">
                <div class="welcome-icon">&#9998;</div>
                <h2 class="welcome-title">Strategic Research on Animal Advocacy</h2>
                <p class="welcome-subtitle">
                    Enter a research topic below to generate an in-depth country profile
                    briefing powered by multi-analyst intelligence.
                </p>
            </div>

            <!-- Loading State -->
            <div id="report-loading" class="report-loading">
                <span class="spinner"></span>
                <p class="report-loading-text">Compiling your briefing&hellip;</p>
            </div>

            <!-- Report Surface -->
            <div id="report-surface" class="report-surface">
                <div id="report-content"></div>
                <button class="btn-secondary btn-new-research" onclick="resetForm()">New Research</button>
            </div>
        </main>

        <!-- ── Side Panel ── -->
        <aside class="side-panel">
            <!-- Empty State -->
            <div id="panel-empty" class="panel-empty">
                <div class="panel-empty-icon">&#128203;</div>
                <p class="panel-empty-text">Research activity will appear here</p>
            </div>

            <!-- Research Metadata -->
            <div id="meta-card" class="meta-card">
                <div class="meta-label">Research Topic</div>
                <div class="meta-value" id="meta-topic"></div>
                <div class="meta-label" style="margin-top: var(--space-sm);">Analysts</div>
                <div class="meta-value" id="meta-analysts"></div>
            </div>

            <!-- Progress -->
            <div id="progress-container" class="progress-container panel-section">
                <div class="progress-header">
                    <span class="spinner" id="spinner"></span>
                    <span id="progress-status">Starting research...</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-info">
                    <span class="progress-status-text" id="progress-status-text"></span>
                    <span class="progress-percent" id="progress-percent">0%</span>
                </div>
            </div>

            <!-- Log -->
            <div class="panel-section">
                <div id="progress-log" class="log-container"></div>
            </div>
        </aside>
    </div>

    <!-- ── Mobile Side Panel Toggle ── -->
    <button class="side-panel-toggle" onclick="toggleSidePanel()" aria-label="Toggle research panel">
        &#9776;
    </button>

    <!-- ── Bottom Bar (Glassmorphism) ── -->
    <div class="bottom-bar">
        <div class="bottom-bar-inner">
            <input
                type="text"
                id="topic"
                class="input-text"
                placeholder="Enter a research topic, e.g. Animal advocacy in Tamil Nadu"
            />
            <button
                type="button"
                class="btn-icon"
                id="randomize-btn"
                onclick="randomizeTopic()"
                title="Try a sample question"
                aria-label="Randomize topic"
            >&#127922;</button>
            <div class="analyst-control">
                <label class="analyst-label" for="max-analysts">Analysts</label>
                <input
                    type="number"
                    id="max-analysts"
                    class="input-number"
                    value="3"
                    min="1"
                    max="6"
                />
            </div>
            <button
                class="btn-primary"
                id="generate-btn"
                onclick="startResearch()"
            >Generate</button>
        </div>
    </div>

    <!-- ── Scripts ── -->
    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/main.js"></script>

</body>
</html>
