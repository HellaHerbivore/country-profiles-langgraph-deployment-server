services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - langgraph-network

  langgraph-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: country-profiles-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./reports:/deps/deploy-langgraph-server-auth/reports
    environment:
      - PYTHONPATH=/deps/deploy-langgraph-server-auth
      - LANGGRAPH_DATABASE_URI=sqlite:///app/langgraph_state.db
      - CORS_ORIGINS=["https://eu.smith.langchain.com"]
      - REDIS_URI=redis://redis:6379
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - langgraph-network

networks:
  langgraph-network:
    driver: bridge
