services:
  langgraph-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: country-profiles-server
    ports:
      - "8000:8000"  # Map container port 8000 to host port 8000
    env_file:
      - .env  # Load environment variables from .env file
    volumes:
      - ./reports:/deps/deploy-langgraph-server-auth/reports
    environment:
      # Override any specific environment variables if needed
      - PYTHONPATH=/deps/deploy-langgraph-server-auth
      - LANGGRAPH_DATABASE_URI=sqlite:///app/langgraph_state.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - langgraph-network

networks:
  langgraph-network:
    driver: bridge